<script type="text/babel" data-presets="react" data-type="module">

// ===== shim بسيط لـ window.storage باستخدام localStorage =====
// (بيدّي نفس شكل الـ API اللي كانت متاحة جوه Claude artifacts: get/set/list)
(function () {
  const PREFIX = "pediatric-clinic-sim::";
  window.storage = {
    async get(key) {
      const raw = localStorage.getItem(PREFIX + key);
      if (raw === null) throw new Error("key not found");
      return { key, value: raw };
    },
    async set(key, value) {
      localStorage.setItem(PREFIX + key, value);
      return { key, value };
    },
    async delete(key) {
      localStorage.removeItem(PREFIX + key);
      return { key, deleted: true };
    },
    async list(prefix) {
      const keys = [];
      const full = PREFIX + (prefix || "");
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith(full)) keys.push(k.slice(PREFIX.length));
      }
      return { keys };
    },
  };
})();

const { useState, useRef, useEffect, useCallback } = React;


const MODEL = "claude-sonnet-4-6";

function extractJSON(text) {
  let t = text.trim();
  t = t.replace(/^```json\s*/i, "").replace(/^```\s*/i, "").replace(/```\s*$/i, "");
  const start = t.indexOf("{");
  const end = t.lastIndexOf("}");
  if (start === -1 || end === -1) throw new Error("no json");
  return JSON.parse(t.slice(start, end + 1));
}

async function callClaude(system, messages) {
  const headers = { "Content-Type": "application/json" };
  if (window.APP_SECRET) headers["x-app-secret"] = window.APP_SECRET;
  const res = await fetch("/.netlify/functions/claude", {
    method: "POST",
    headers,
    body: JSON.stringify({
      max_tokens: 2000,
      system,
      messages,
    }),
  });
  const data = await res.json();
  if (!res.ok) throw new Error((data && data.error && data.error.error && data.error.error.message) || "server error");
  const text = (data.content || [])
    .map((b) => (b.type === "text" ? b.text : ""))
    .filter(Boolean)
    .join("\n");
  return text;
}

const DIFFICULTIES = [
  { id: "سهلة", label: "سهلة", desc: "حالات شائعة وواضحة" },
  { id: "متوسطة", label: "متوسطة", desc: "محتاجة تفكير وتفريق" },
  { id: "صعبة", label: "صعبة", desc: "حالات معقدة أو مضلِّلة" },
];

function Pulse({ active }) {
  return (
    <svg viewBox="0 0 120 24" className={`pulse-svg ${active ? "pulse-active" : ""}`} preserveAspectRatio="none">
      <path

        stroke="currentColor"
        strokeWidth="2"
        strokeLinecap="round"
        strokeLinejoin="round"
      />
    </svg>
  );
}

function App() {
  const [phase, setPhase] = useState("setup"); // setup | loadingCase | interview | evaluating | result
  const [difficulty, setDifficulty] = useState("متوسطة");
  const [caseData, setCaseData] = useState(null);
  const [messages, setMessages] = useState([]); // {role:'mother'|'doctor', text}
  const [inputText, setInputText] = useState("");
  const [isRecording, setIsRecording] = useState(false);
  const [autoSpeak, setAutoSpeak] = useState(true);
  const [busy, setBusy] = useState(false);
  const [errorMsg, setErrorMsg] = useState("");

  const [diagnosisInput, setDiagnosisInput] = useState("");
  const [diagnosisResult, setDiagnosisResult] = useState(null);
  const [quiz, setQuiz] = useState(null);
  const [quizAnswers, setQuizAnswers] = useState([]);
  const [quizSubmitted, setQuizSubmitted] = useState(false);

  const [view, setView] = useState("clinic"); // clinic | history
  const [history, setHistory] = useState([]);
  const [historyLoaded, setHistoryLoaded] = useState(false);

  const chatEndRef = useRef(null);
  const recognitionRef = useRef(null);
  const voicesRef = useRef([]);

  useEffect(() => {
    chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [messages, phase]);

  useEffect(() => {
    const loadVoices = () => {
      voicesRef.current = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
    };
    loadVoices();
    if (window.speechSynthesis) window.speechSynthesis.onvoiceschanged = loadVoices;
  }, []);

  const loadHistory = useCallback(async () => {
    try {
      const list = await window.storage.list("sessions:", false);
      const keys = (list && list.keys) || [];
      const items = [];
      for (const k of keys) {
        try {
          const r = await window.storage.get(k, false);
          if (r && r.value) items.push(JSON.parse(r.value));
        } catch (e) {}
      }
      items.sort((a, b) => b.ts - a.ts);
      setHistory(items);
    } catch (e) {
      setHistory([]);
    }
    setHistoryLoaded(true);
  }, []);

  useEffect(() => {
    if (view === "history" && !historyLoaded) loadHistory();
  }, [view, historyLoaded, loadHistory]);

  function speak(text) {
    if (!autoSpeak || !window.speechSynthesis) return;
    try {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      const arVoice = voicesRef.current.find((v) => v.lang && v.lang.toLowerCase().startsWith("ar"));
      if (arVoice) u.voice = arVoice;
      u.lang = arVoice ? arVoice.lang : "ar-EG";
      u.rate = 0.98;
      window.speechSynthesis.speak(u);
    } catch (e) {}
  }

  function getRecognition() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return null;
    if (!recognitionRef.current) {
      const rec = new SR();
      rec.lang = "ar-EG";
      rec.interimResults = false;
      rec.maxAlternatives = 1;
      recognitionRef.current = rec;
    }
    return recognitionRef.current;
  }

  function toggleRecording() {
    const rec = getRecognition();
    if (!rec) {
      setErrorMsg("المتصفح ده مش بيدعم التعرف الصوتي. جرّب Chrome، أو اكتب سؤالك عادي.");
      return;
    }
    if (isRecording) {
      rec.stop();
      setIsRecording(false);
      return;
    }
    setErrorMsg("");
    rec.onresult = (e) => {
      const transcript = e.results[0][0].transcript;
      setInputText(transcript);
      setIsRecording(false);
      setTimeout(() => sendQuestion(transcript), 200);
    };
    rec.onerror = () => setIsRecording(false);
    rec.onend = () => setIsRecording(false);
    try {
      rec.start();
      setIsRecording(true);
    } catch (e) {
      setIsRecording(false);
    }
  }

  async function startCase() {
    setPhase("loadingCase");
    setErrorMsg("");
    setDiagnosisResult(null);
    setDiagnosisInput("");
    setQuiz(null);
    setQuizAnswers([]);
    setQuizSubmitted(false);

    const system = `إنت مساعد بيولّد حالات مرضية تدريبية واقعية لطبيب أطفال بيذاكر ويتدرب على المهارات الإكلينيكية.
اختار حالة شائعة وواقعية في طب الأطفال (تنفسي، هضمي، تحسسي، عدوى، تغذية، نمو، جلدية، عصبية بسيطة، إلخ)، بمستوى صعوبة "${difficulty}".
رجّع JSON فقط بدون أي نص تاني أو markdown fences، بالشكل ده بالظبط:
{
  "ageGender": "وصف قصير للسن والنوع",
  "topic": "اسم الجهاز أو التخصص",
  "diagnosis": "التشخيص الصحيح",
  "history": "التاريخ المرضي الكامل، تفاصيل دقيقة",
  "vitals": "العلامات الحيوية بالأرقام",
  "examFindings": "نتائج الفحص الإكلينيكي بالتفصيل",
  "keyLearningPoints": "أهم نقاط تعليمية عن المرض ده",
  "motherOpeningLine": "أول جملة تقولها الأم بالعامية المصرية، قلقانة، بتوصف الشكوى الرئيسية بس من غير أي تفاصيل طبية دقيقة أو أرقام"
}`;
    try {
      const text = await callClaude(system, [{ role: "user", content: "ابدأ حالة جديدة" }]);
      const data = extractJSON(text);
      setCaseData(data);
      setMessages([{ role: "mother", text: data.motherOpeningLine }]);
      speak(data.motherOpeningLine);
      setPhase("interview");
    } catch (e) {
      setErrorMsg("حصل خطأ في تجهيز الحالة. جرّب تاني.");
      setPhase("setup");
    }
  }

  async function sendQuestion(overrideText) {
    const q = (overrideText ?? inputText).trim();
    if (!q || busy || !caseData) return;
    setInputText("");
    setErrorMsg("");
    const newMessages = [...messages, { role: "doctor", text: q }];
    setMessages(newMessages);
    setBusy(true);

    const system = `إنت بتلعب دور أم مصرية قلقانة على ابنها/بنتها اللي عيان، وبتتكلم عامية مصرية طبيعية جدًا زي أي أم بتتكلم مع دكتور.
الدكتور هيسألك أسئلة عشان يوصل للتشخيص. جاوبي بس بناءً على المعلومات اللي تحت، من غير ما تستخدمي مصطلحات طبية، ومن غير ما تقولي التشخيص أو تلمّحي له مهما كان السؤال.
لو الدكتور سأل حاجة مش موجودة صراحة في المعلومات، جاوبي بشكل واقعي ومنطقي يتماشى مع باقي الحالة من غير ما تتناقضي مع نفسك.
لو الدكتور سأل عن نتيجة فحص إكلينيكي معين (زي الصدر أو البطن أو الحلق)، اعتبري إنه فحص الطفل فعلاً وجاوبي بنتيجة الفحص المناسبة من المعلومات، لكن بأسلوب أم مش بمصطلحات طبية (يعني بلغي النتيجة كوصف، وسيبي الدكتور يفسرها).
ردودك لازم تكون قصيرة (جملة أو جملتين) وطبيعية، من غير مقدمات زي "بصفتي أم".

أول جملة قولتيها للدكتور: "${caseData.motherOpeningLine}"

معلومات الحالة (سرية تمامًا، متقوليهاش صراحة):
- السن والنوع: ${caseData.ageGender}
- التاريخ المرضي: ${caseData.history}
- العلامات الحيوية: ${caseData.vitals}
- الفحص الإكلينيكي: ${caseData.examFindings}`;

    const apiMessages = [];
    for (let i = 1; i < newMessages.length; i++) {
      const m = newMessages[i];
      apiMessages.push({ role: m.role === "doctor" ? "user" : "assistant", content: m.text });
    }

    try {
      const reply = await callClaude(system, apiMessages);
      setMessages((prev) => [...prev, { role: "mother", text: reply }]);
      speak(reply);
    } catch (e) {
      setErrorMsg("حصل خطأ في الرد. جرّب تسأل تاني.");
    }
    setBusy(false);
  }

  async function submitDiagnosis() {
    if (!diagnosisInput.trim() || busy) return;
    setBusy(true);
    setErrorMsg("");
    setPhase("evaluating");

    const system = `إنت استشاري أطفال بيقيّم تشخيص طبيب بيذاكر. التشخيص الصحيح للحالة هو: "${caseData.diagnosis}".
معلومات الحالة: التاريخ المرضي: ${caseData.history} | العلامات الحيوية: ${caseData.vitals} | الفحص: ${caseData.examFindings} | نقاط تعليمية: ${caseData.keyLearningPoints}

الطبيب كتب التشخيص ده: "${diagnosisInput.trim()}"

قيّم لو التشخيص صحيح (اقبلي المرادفات والصياغات المختلفة اللي بتدي نفس المعنى الطبي، ومتكونيش متشددة زيادة). بعد كده اعملي 5 أسئلة اختيار من متعدد (MCQ) عن المرض بتاع الحالة ده (باثوفيزيولوجي، تشخيص تفريقي، خطة العلاج، مضاعفات، متى التحويل لمستشفى...) بمستوى مناسب لطبيب بيذاكر.

رجّعي JSON فقط بدون أي نص تاني أو markdown fences، بالشكل ده بالظبط:
{
  "isCorrect": true,
  "correctDiagnosis": "...",
  "feedbackText": "تعليق قصير واضح يوضح ليه التشخيص صح أو غلط",
  "quiz": [
    {"question": "...", "options": ["...", "...", "...", "..."], "correctIndex": 0, "explanation": "..."}
  ]
}
لازم مصفوفة quiz تحتوي بالظبط على 5 عناصر.`;

    try {
      const text = await callClaude(system, [{ role: "user", content: "قيّم التشخيص وجهّز الأسئلة" }]);
      const data = extractJSON(text);
      setDiagnosisResult({ isCorrect: data.isCorrect, correctDiagnosis: data.correctDiagnosis, feedbackText: data.feedbackText });
      setQuiz(data.quiz);
      setQuizAnswers(new Array(data.quiz.length).fill(null));
      setPhase("result");
    } catch (e) {
      setErrorMsg("حصل خطأ في تقييم التشخيص. جرّب تاني.");
      setPhase("interview");
    }
    setBusy(false);
  }

  function selectAnswer(qIdx, optIdx) {
    if (quizSubmitted) return;
    setQuizAnswers((prev) => {
      const copy = [...prev];
      copy[qIdx] = optIdx;
      return copy;
    });
  }

  async function submitQuiz() {
    setQuizSubmitted(true);
    const score = quiz.reduce((acc, q, i) => acc + (quizAnswers[i] === q.correctIndex ? 1 : 0), 0);
    const record = {
      id: `${Date.now()}`,
      ts: Date.now(),
      topic: caseData.topic,
      ageGender: caseData.ageGender,
      difficulty,
      diagnosis: caseData.diagnosis,
      diagnosisCorrect: diagnosisResult.isCorrect,
      quizScore: score,
      quizTotal: quiz.length,
    };
    try {
      await window.storage.set(`sessions:${record.id}`, JSON.stringify(record), false);
      setHistory((prev) => [record, ...prev]);
    } catch (e) {}
  }

  function newCase() {
    setPhase("setup");
    setCaseData(null);
    setMessages([]);
    setDiagnosisInput("");
    setDiagnosisResult(null);
    setQuiz(null);
    setQuizAnswers([]);
    setQuizSubmitted(false);
    setErrorMsg("");
  }

  const quizScore = quiz && quizSubmitted ? quiz.reduce((acc, q, i) => acc + (quizAnswers[i] === q.correctIndex ? 1 : 0), 0) : 0;
  const totalSessions = history.length;
  const correctDiag = history.filter((h) => h.diagnosisCorrect).length;
  const avgQuiz = totalSessions ? (history.reduce((a, h) => a + h.quizScore / h.quizTotal, 0) / totalSessions) * 100 : 0;

  return (

        .toggle{ display:flex; align-items:center; gap:6px; font-size:12.5px; color:var(--ink-soft); cursor:pointer; user-select:none;}
        .toggle input{ accent-color:var(--teal); width:15px; height:15px;}

        .error-box{ background:var(--coral-soft); color:#7A2D24; border-radius:10px; padding:9px 13px; font-size:12.5px; margin:10px 0; }

        .diagnosis-box{ margin-top:18px; border-top:1px dashed var(--border); padding-top:16px; }
        .section-eyebrow{ font-size:11.5px; font-weight:800; color:var(--teal); letter-spacing:.3px; margin-bottom:6px; }
        textarea.text-input{ width:100%; min-height:70px; resize:vertical; font-family:'Cairo'; }

        .result-banner{ border-radius:14px; padding:16px; margin-bottom:16px; }
        .result-banner.ok{ background:#E4F3EA; border:1px solid #B9E0C6; }
        .result-banner.bad{ background:var(--coral-soft); border:1px solid #EBC3BE; }
        .result-title{ font-weight:800; font-size:16px; margin-bottom:4px; }
        .result-title.ok{ color:#1E6B3B; }
        .result-title.bad{ color:#7A2D24; }
        .result-text{ font-size:13.5px; line-height:1.7; color:var(--ink); }

        .q-block{ margin-bottom:18px; }
        .q-title{ font-weight:800; font-size:14.5px; margin-bottom:9px; }
        .opt{
          display:block; width:100%; text-align:right; padding:11px 14px; border-radius:11px; border:1.5px solid var(--border);
          background:#fff; margin-bottom:7px; cursor:pointer; font-family:'Cairo'; font-size:13.5px; transition:.15s;
        }
        .opt.chosen{ border-color:var(--teal); background:#EAF6F2; }
        .opt.correct{ border-color:#2E9D5E; background:#E4F3EA; }
        .opt.wrong{ border-color:var(--coral); background:var(--coral-soft); }
        .opt-explain{ font-size:12px; color:var(--ink-soft); margin-top:5px; padding:0 4px; line-height:1.6; }

        .score-banner{ text-align:center; padding:18px; background:linear-gradient(135deg,var(--teal),var(--teal-deep)); border-radius:16px; color:#fff; margin-bottom:16px;}
        .score-num{ font-family:'El Messiri'; font-size:36px; font-weight:700; }
        .score-label{ font-size:12.5px; opacity:.9; }

        .hist-stats{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:16px; }
        .stat-card{ background:#fff; border:1px solid var(--border); border-radius:14px; padding:13px; text-align:center;}
        .stat-num{ font-family:'El Messiri'; font-size:22px; font-weight:700; color:var(--teal-deep); }
        .stat-label{ font-size:11px; color:var(--ink-soft); margin-top:2px; }
        .hist-row{ display:flex; justify-content:space-between; align-items:center; padding:12px 14px; border:1px solid var(--border); border-radius:12px; margin-bottom:8px; background:#fff;}
        .hist-topic{ font-weight:700; font-size:13.5px; }
        .hist-sub{ font-size:11.5px; color:var(--ink-soft); margin-top:2px;}
        .hist-badge{ font-size:11px; font-weight:700; padding:4px 10px; border-radius:100px; }
        .hist-badge.ok{ background:#E4F3EA; color:#1E6B3B; }
        .hist-badge.bad{ background:var(--coral-soft); color:#7A2D24; }
        .empty-state{ text-align:center; padding:40px 14px; color:var(--ink-soft); font-size:13.5px; }

        .loading-wrap{ text-align:center; padding:50px 14px; }
        .loading-text{ font-size:14px; color:var(--ink-soft); margin-top:14px; }

        @media (max-width:480px){
          .diff-grid{ grid-template-columns:1fr; }
          .bubble{ max-width:88%; }
        }
      `}</style>

      <div className="shell">
        <div className="top">
          <div className="brand">
            <div className="brand-mark">🩺</div>
            <div>
              <h1>عيادة التدريب</h1>
              <div className="subtitle">حالات أطفال تفاعلية بالصوت والنص</div>
            </div>
          </div>
          <div className="tabs">
            <button className={`tab-btn ${view === "clinic" ? "active" : ""}`} onClick={() => setView("clinic")}>العيادة</button>
            <button className={`tab-btn ${view === "history" ? "active" : ""}`} onClick={() => setView("history")}>السجل</button>
          </div>
        </div>

        {view === "history" && (
          <div className="card">
            <div className="hist-stats">
              <div className="stat-card">
                <div className="stat-num">{totalSessions}</div>
                <div className="stat-label">حالة اتدربت عليها</div>
              </div>
              <div className="stat-card">
                <div className="stat-num">{totalSessions ? Math.round((correctDiag / totalSessions) * 100) : 0}%</div>
                <div className="stat-label">دقة التشخيص</div>
              </div>
              <div className="stat-card">
                <div className="stat-num">{Math.round(avgQuiz)}%</div>
                <div className="stat-label">متوسط الاختبار</div>
              </div>
            </div>
            {history.length === 0 ? (
              <div className="empty-state">لسه معملتش أي حالة. روح لتاب "العيادة" وابدأ أول حالة!</div>
            ) : (
              history.map((h) => (
                <div className="hist-row" key={h.id}>
                  <div>
                    <div className="hist-topic">{h.topic} — {h.diagnosis}</div>
                    <div className="hist-sub">{h.ageGender} · {h.difficulty} · {new Date(h.ts).toLocaleDateString("ar-EG")}</div>
                  </div>
                  <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                    <span className={`hist-badge ${h.diagnosisCorrect ? "ok" : "bad"}`}>{h.diagnosisCorrect ? "تشخيص صح" : "تشخيص غلط"}</span>
                    <span className="hist-badge ok">{h.quizScore}/{h.quizTotal}</span>
                  </div>
                </div>
              ))
            )}
          </div>
        )}

        {view === "clinic" && phase === "setup" && (
          <div className="card">
            <div className="section-eyebrow">جهّز الحالة</div>
            <p style={{ fontSize: 13.5, color: "var(--ink-soft)", margin: "4px 0 0", lineHeight: 1.7 }}>
              هتيجي أم بابنها، احكيلها إنك الدكتور واسألها عن الأعراض والتاريخ المرضي لحد ما توصل للتشخيص، وبعدها هتتسأل أسئلة عن المرض نفسه.
            </p>
            <div className="diff-grid">
              {DIFFICULTIES.map((d) => (
                <div key={d.id} className={`diff-card ${difficulty === d.id ? "sel" : ""}`} onClick={() => setDifficulty(d.id)}>
                  <div className="diff-name">{d.label}</div>
                  <div className="diff-desc">{d.desc}</div>
                </div>
              ))}
            </div>
            {errorMsg && <div className="error-box">{errorMsg}</div>}
            <button className="btn btn-primary btn-block" onClick={startCase}>ابدأ حالة جديدة</button>
          </div>
        )}

        {view === "clinic" && phase === "loadingCase" && (
          <div className="card loading-wrap">
            <Pulse active={true} />
            <div className="loading-text">بيتم تجهيز الحالة...</div>
          </div>
        )}

        {view === "clinic" && (phase === "interview" || phase === "evaluating") && caseData && (
          <div className="card">
            <div className="patient-card">
              <div className="patient-avatar">👶</div>
              <div>
                <div className="patient-title">{caseData.ageGender}<span className="chip">{caseData.topic}</span></div>
                <div className="patient-meta">اسأل الأم عشان توصل للتشخيص</div>
              </div>
            </div>

            <div className="chat-box">
              {messages.map((m, i) => (
                <div className={`msg-row ${m.role}`} key={i}>
                  <div className={`bubble ${m.role}`}>
                    <span className="msg-label">{m.role === "doctor" ? "إنت" : "الأم"}</span>
                    {m.text}
                  </div>
                </div>
              ))}
              {busy && phase === "interview" && (
                <div className="msg-row mother">
                  <div className="bubble mother">...بتكتب</div>
                </div>
              )}
              <div ref={chatEndRef} />
            </div>

            <Pulse active={isRecording} />

            <div className="input-row" style={{ marginTop: 8 }}>
              <button className={`mic-btn ${isRecording ? "recording" : ""}`} onClick={toggleRecording} title="اتكلم">
                {isRecording ? "■" : "🎙️"}
              </button>
              <input
                className="text-input"
                placeholder="اكتب سؤالك للأم..."
                value={inputText}
                onChange={(e) => setInputText(e.target.value)}
                onKeyDown={(e) => e.key === "Enter" && sendQuestion()}
                disabled={busy}
              />
              <button className="send-btn" onClick={() => sendQuestion()} disabled={busy || !inputText.trim()}>➤</button>
            </div>

            <div className="toolbar">
              <label className="toggle">
                <input type="checkbox" checked={autoSpeak} onChange={(e) => setAutoSpeak(e.target.checked)} />
                تشغيل صوت الأم تلقائيًا
              </label>
              <button className="btn btn-ghost" onClick={newCase}>حالة جديدة</button>
            </div>

            {errorMsg && <div className="error-box">{errorMsg}</div>}

            <div className="diagnosis-box">
              <div className="section-eyebrow">التشخيص النهائي</div>
              <textarea
                className="text-input"
                placeholder="اكتب تشخيصك للحالة هنا..."
                value={diagnosisInput}
                onChange={(e) => setDiagnosisInput(e.target.value)}
                disabled={phase === "evaluating"}
              />
              <button
                className="btn btn-amber btn-block"
                style={{ marginTop: 10 }}
                onClick={submitDiagnosis}
                disabled={phase === "evaluating" || !diagnosisInput.trim()}
              >
                {phase === "evaluating" ? "بيتم التقييم..." : "قدّم التشخيص"}
              </button>
            </div>
          </div>
        )}

        {view === "clinic" && phase === "result" && caseData && diagnosisResult && quiz && (
          <div className="card">
            <div className={`result-banner ${diagnosisResult.isCorrect ? "ok" : "bad"}`}>
              <div className={`result-title ${diagnosisResult.isCorrect ? "ok" : "bad"}`}>
                {diagnosisResult.isCorrect ? "تشخيص صحيح ✅" : "مش التشخيص الدقيق ✗"}
              </div>
              <div className="result-text">
                <strong>التشخيص الصحيح:</strong> {diagnosisResult.correctDiagnosis}
                <br />
                {diagnosisResult.feedbackText}
              </div>
            </div>

            {!quizSubmitted && <div className="section-eyebrow" style={{ marginBottom: 14 }}>أسئلة عن المرض</div>}

            {quizSubmitted && (
              <div className="score-banner">
                <div className="score-num">{quizScore}/{quiz.length}</div>
                <div className="score-label">نتيجتك في الاختبار</div>
              </div>
            )}

            {quiz.map((q, qi) => (
              <div className="q-block" key={qi}>
                <div className="q-title">{qi + 1}. {q.question}</div>
                {q.options.map((opt, oi) => {
                  let cls = "opt";
                  if (quizAnswers[qi] === oi && !quizSubmitted) cls += " chosen";
                  if (quizSubmitted) {
                    if (oi === q.correctIndex) cls += " correct";
                    else if (quizAnswers[qi] === oi) cls += " wrong";
                  }
                  return (
                    <button key={oi} className={cls} onClick={() => selectAnswer(qi, oi)} disabled={quizSubmitted}>
                      {opt}
                    </button>
                  );
                })}
                {quizSubmitted && <div className="opt-explain">💡 {q.explanation}</div>}
              </div>
            ))}

            {!quizSubmitted ? (
              <button
                className="btn btn-primary btn-block"
                onClick={submitQuiz}
                disabled={quizAnswers.some((a) => a === null)}
              >
                سلّم الإجابات
              </button>
            ) : (
              <button className="btn btn-primary btn-block" onClick={newCase}>حالة جديدة</button>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));

</script>
</body>
</html>
